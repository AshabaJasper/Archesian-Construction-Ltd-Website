<body data-barba="wrapper">
  <main id="main-content" data-barba="container" data-barba-namespace="projects">
    <section class="page-hero page-hero--medium">
      <div class="page-hero__bg"><img src="assets/images/projects/project-2.png" alt="Completed commercial construction project" width="1920" height="1080" loading="eager"><div class="page-hero__overlay"></div></div>
      <div class="page-hero__content">
        <span class="text-eyebrow text-eyebrow--accent" data-reveal="fade-up">Projects</span>
        <h1 class="text-display" data-reveal="fade-up" data-reveal-delay="0.1">Work with a measured finish.</h1>
        <p class="text-lead" data-reveal="fade-up" data-reveal-delay="0.2">Selected residential, commercial, and renovation projects delivered through disciplined coordination.</p>
      </div>
    </section>
    <section class="section section--dark">
      <div class="container">
        <div class="flex flex--between flex--wrap flex--gap-md" data-reveal="fade-up">
          <div class="flex flex--wrap flex--gap-sm">
            <button class="filter-pill filter-pill--active" data-filter-category="all">All</button>
            <button class="filter-pill" data-filter-category="residential">Residential</button>
            <button class="filter-pill" data-filter-category="commercial">Commercial</button>
            <button class="filter-pill" data-filter-category="renovation">Renovation</button>
          </div>
          <label class="sr-only" for="project-sort">Sort projects</label>
          <select id="project-sort" class="form-select" data-sort>
            <option value="newest">Newest First</option>
            <option value="oldest">Oldest First</option>
          </select>
        </div>
        <div class="spacer--xl"></div>
        <div class="grid grid--3" data-project-grid data-reveal="stagger">
          <a href="project-detail.html" class="project-card" data-project-item data-category="residential" data-year="2025" data-cursor-text="View"><div class="project-card__image-wrapper"><img src="assets/images/projects/project-1.png" alt="Hillcrest Residence" class="project-card__image" width="600" height="450" loading="lazy"><div class="project-card__overlay"></div></div><div class="project-card__content"><span class="project-card__category">Residential</span><h3 class="project-card__title">Hillcrest Residence</h3><div class="project-card__meta"><span>Kampala</span><span class="project-card__meta-divider">|</span><span>2025</span></div></div></a>
          <a href="project-detail.html" class="project-card" data-project-item data-category="commercial" data-year="2024" data-cursor-text="View"><div class="project-card__image-wrapper"><img src="assets/images/projects/project-2.png" alt="Northline Offices" class="project-card__image" width="600" height="450" loading="lazy"><div class="project-card__overlay"></div></div><div class="project-card__content"><span class="project-card__category">Commercial</span><h3 class="project-card__title">Northline Offices</h3><div class="project-card__meta"><span>Entebbe</span><span class="project-card__meta-divider">|</span><span>2024</span></div></div></a>
          <a href="project-detail.html" class="project-card" data-project-item data-category="renovation" data-year="2024" data-cursor-text="View"><div class="project-card__image-wrapper"><img src="assets/images/projects/project-3.png" alt="Lakeside Penthouse" class="project-card__image" width="600" height="450" loading="lazy"><div class="project-card__overlay"></div></div><div class="project-card__content"><span class="project-card__category">Renovation</span><h3 class="project-card__title">Lakeside Penthouse</h3><div class="project-card__meta"><span>Jinja</span><span class="project-card__meta-divider">|</span><span>2024</span></div></div></a>
        </div>
      </div>
    </section>
  </main>
